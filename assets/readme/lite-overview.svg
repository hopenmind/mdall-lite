<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="MD -> ALL lite: convert any document, edit its equations, recover the source, and drive it headless over MCP">
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B026C9"/>
      <stop offset="1" stop-color="#6A1B9A"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2F2F5"/>
      <stop offset="1" stop-color="#A9A9B4"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#A020C0"/>
    </marker>
    <style>
      .ink{fill:#241734}.mut{fill:#4E3D66}.card{fill:#FFFFFF;stroke:#D8C7EF;stroke-width:1.5}
      .chip{fill:#F1E8FB;stroke:#D8C7EF;stroke-width:1}
      .h{font-size:15px;font-weight:700;fill:#241734}.s{font-size:11.5px;fill:#4E3D66}
      .t{font-size:11px;fill:#241734}.flow{stroke:#A020C0;stroke-width:2.2;fill:none}
    </style>
  </defs>

  <!-- brand desk -->
  <rect x="0" y="0" width="920" height="470" rx="18" fill="#A020C0"/>
  <rect x="0" y="0" width="920" height="470" rx="18" fill="#000000" opacity="0.03"/>

  <!-- title -->
  <text x="34" y="46" font-size="22" font-weight="800" class="ink">MD <tspan fill="#A020C0">&#8594;</tspan> ALL <tspan font-size="15" class="mut">lite</tspan></text>
  <text x="34" y="68" class="s">Convert anything. Fix the equations. Recover the source. Offline, one binary.</text>

  <!-- IN: import formats -->
  <text x="60" y="118" class="s" text-anchor="middle" font-weight="700">IMPORT · 23</text>
  <g>
    <rect class="chip" x="18" y="130" width="84" height="24" rx="6"/><text x="60" y="146" class="t" text-anchor="middle">DOCX</text>
    <rect class="chip" x="18" y="160" width="84" height="24" rx="6"/><text x="60" y="176" class="t" text-anchor="middle">HTML · ODT</text>
    <rect class="chip" x="18" y="190" width="84" height="24" rx="6"/><text x="60" y="206" class="t" text-anchor="middle">EPUB · RTF</text>
    <rect class="chip" x="18" y="220" width="84" height="24" rx="6"/><text x="60" y="236" class="t" text-anchor="middle">TeX · Typst</text>
    <rect class="chip" x="18" y="250" width="84" height="24" rx="6"/><text x="60" y="266" class="t" text-anchor="middle">+ 15 more</text>
  </g>
  <path class="flow" d="M108 200 H176" marker-end="url(#arrow)"/>

  <!-- CENTER: the lite core -->
  <rect class="card" x="182" y="96" width="300" height="210" rx="14"/>
  <text x="332" y="124" class="h" text-anchor="middle">Markdown + LaTeX core</text>
  <rect x="204" y="140" width="256" height="46" rx="9" fill="url(#violet)"/>
  <text x="332" y="162" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Equation gallery</text>
  <text x="332" y="178" font-size="10.5" fill="#ECD6F5" text-anchor="middle">click an equation &#8594; edit raw LaTeX &#8594; re-render</text>

  <rect x="204" y="196" width="123" height="42" rx="9" fill="#F1E8FB" stroke="#D8C7EF"/>
  <text x="265" y="214" font-size="11.5" font-weight="700" class="ink" text-anchor="middle">Converter hub</text>
  <text x="265" y="230" font-size="9.5" class="mut" text-anchor="middle">batch drag &amp; drop</text>

  <rect x="337" y="196" width="123" height="42" rx="9" fill="#F1E8FB" stroke="#D8C7EF"/>
  <text x="398" y="214" font-size="11.5" font-weight="700" class="ink" text-anchor="middle">Reversible DOCX</text>
  <text x="398" y="230" font-size="9.5" class="mut" text-anchor="middle">3 recovery layers</text>

  <rect x="204" y="248" width="256" height="42" rx="9" fill="url(#silver)" stroke="#B9B9C2"/>
  <text x="332" y="266" font-size="11" font-weight="700" class="ink" text-anchor="middle">Pure Rust &#183; zero runtime deps &#183; fully offline</text>
  <text x="332" y="281" font-size="9.5" class="mut" text-anchor="middle">KaTeX + Typst math engines compiled in</text>

  <!-- OUT: export formats -->
  <path class="flow" d="M488 175 H556" marker-end="url(#arrow)"/>
  <text x="612" y="118" class="s" text-anchor="middle" font-weight="700">EXPORT · 18</text>
  <g>
    <rect class="chip" x="562" y="130" width="100" height="24" rx="6"/><text x="612" y="146" class="t" text-anchor="middle">PDF (3-tier)</text>
    <rect class="chip" x="562" y="160" width="100" height="24" rx="6"/><text x="612" y="176" class="t" text-anchor="middle">DOCX · HTML</text>
    <rect class="chip" x="562" y="190" width="100" height="24" rx="6"/><text x="612" y="206" class="t" text-anchor="middle">ODT · EPUB</text>
    <rect class="chip" x="562" y="220" width="100" height="24" rx="6"/><text x="612" y="236" class="t" text-anchor="middle">Typst · TeX</text>
    <rect class="chip" x="562" y="250" width="100" height="24" rx="6"/><text x="612" y="266" class="t" text-anchor="middle">RTF · TXT · SVG</text>
  </g>

  <!-- reversibility loop: DOCX out -> recover -> back into the core -->
  <path class="flow" style="stroke-dasharray:6 5" d="M612 246 V330 H332 V308" marker-end="url(#arrow)"/>
  <text x="470" y="325" font-size="11" font-weight="700" fill="#A020C0" text-anchor="middle">recover_source: annotated DOCX &#8594; original MD + LaTeX, intact</text>

  <!-- MCP branch -->
  <rect x="688" y="150" width="212" height="104" rx="12" fill="#241734"/>
  <text x="794" y="178" font-size="14" font-weight="800" fill="#F2F2F5" text-anchor="middle">mdall-mcp</text>
  <text x="794" y="197" font-size="10.5" fill="#ECD6F5" text-anchor="middle">headless server, same core</text>
  <text x="794" y="216" font-size="10.5" fill="#A020C0" text-anchor="middle">Model Context Protocol (stdio)</text>
  <text x="794" y="235" font-size="10" fill="#B9A9D0" text-anchor="middle">convert / recover from any LLM tool</text>
  <path class="flow" d="M672 202 H684" marker-end="url(#arrow)"/>

  <!-- footer -->
  <text x="34" y="452" font-size="11" class="mut">by Hope &#39;n Mind &#183; sibling of the full MD &#8594; ALL editor</text>
  <text x="886" y="452" font-size="11" font-weight="700" fill="#A020C0" text-anchor="end">write once &#183; export everywhere &#183; recover everything</text>
</svg>
