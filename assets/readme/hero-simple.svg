<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 250" width="920" height="250" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4EFFB"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2A1758" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="920" height="250" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="918" height="248" rx="15" fill="none" stroke="#E7DCF6" stroke-width="1"/>

  <text x="460" y="40" font-size="21" font-weight="700" fill="#241734" text-anchor="middle">New here? It works in three simple steps.</text>
  <text x="460" y="64" font-size="13.5" fill="#6E5E93" text-anchor="middle">No setup, no internet. Download one file, run it, and turn your documents into any format.</text>

  <!-- Card 1: Download -->
  <g filter="url(#soft)"><rect x="40" y="92" width="250" height="132" rx="14" fill="#FFFFFF" stroke="#E7DCF6" stroke-width="1.5"/></g>
  <circle cx="70" cy="120" r="15" fill="#A020C0"/>
  <text x="70" y="125" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <g stroke="#5B2AA6" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M254 110 v18"/><path d="M245 122 l9 8 l9 -8"/><path d="M243 136 h22"/>
  </g>
  <text x="165" y="170" font-size="15.5" font-weight="700" fill="#241734" text-anchor="middle">Download &amp; run</text>
  <text x="165" y="192" font-size="12" fill="#6E5E93" text-anchor="middle">One file. No install,</text>
  <text x="165" y="208" font-size="12" fill="#6E5E93" text-anchor="middle">nothing else to set up.</text>

  <path d="M303 158 h16 m-7 -6 l7 6 l-7 6" stroke="#A020C0" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 2: Add a document -->
  <g filter="url(#soft)"><rect x="335" y="92" width="250" height="132" rx="14" fill="#FFFFFF" stroke="#E7DCF6" stroke-width="1.5"/></g>
  <circle cx="365" cy="120" r="15" fill="#A020C0"/>
  <text x="365" y="125" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <g fill="none" stroke="#5B2AA6" stroke-linejoin="round">
    <path d="M540 108 h15 l7 7 v23 h-22 z" fill="#F1E8FB" stroke-width="2.3"/>
    <path d="M555 108 v7 h7" stroke-width="2.3"/>
    <path d="M545 124 h12 M545 131 h9" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <text x="460" y="170" font-size="15.5" font-weight="700" fill="#241734" text-anchor="middle">Add your document</text>
  <text x="460" y="192" font-size="12" fill="#6E5E93" text-anchor="middle">Word, PDF, HTML, LaTeX</text>
  <text x="460" y="208" font-size="12" fill="#6E5E93" text-anchor="middle">and 19 more, dropped in.</text>

  <path d="M598 158 h16 m-7 -6 l7 6 l-7 6" stroke="#A020C0" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Card 3: Convert -->
  <g filter="url(#soft)"><rect x="630" y="92" width="250" height="132" rx="14" fill="#FFFFFF" stroke="#E7DCF6" stroke-width="1.5"/></g>
  <circle cx="660" cy="120" r="15" fill="#A020C0"/>
  <text x="660" y="125" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <g fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M832 106 h13 l6 6 v22 h-19 z" fill="#F1E8FB" stroke="#5B2AA6" stroke-width="2.3"/>
    <path d="M845 106 v6 h6" stroke="#5B2AA6" stroke-width="2.3"/>
    <path d="M851 124 h16 m-7 -6 l7 6 l-7 6" stroke="#A020C0" stroke-width="2.4"/>
  </g>
  <text x="755" y="170" font-size="15.5" font-weight="700" fill="#241734" text-anchor="middle">Convert to anything</text>
  <text x="755" y="192" font-size="12" fill="#6E5E93" text-anchor="middle">Pick a format. Your</text>
  <text x="755" y="208" font-size="12" fill="#6E5E93" text-anchor="middle">equations stay perfect.</text>
</svg>
